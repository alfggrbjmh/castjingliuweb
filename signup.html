<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castorice & Jingliu - Sign Up</title>
    <!-- Phosphor Icons -->
    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: calc(100vh - 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 24px 48px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .auth-image {
            flex: 1.2;
            position: relative;
            background: var(--primary-teal-dark);
            display: none;
        }
        .auth-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .auth-image-text {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            color: var(--white);
        }
        .auth-image-text h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        .auth-form-wrapper {
            flex: 1;
            padding: 48px;
            background: var(--white);
        }
        .auth-form-wrapper h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .auth-form-wrapper p {
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--border-radius-md);
            border: 1px solid rgba(0,0,0,0.1);
            background: #f8fafb;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-teal);
            box-shadow: 0 0 0 4px rgba(106, 208, 201, 0.1);
            background: var(--white);
        }
        .btn-auth {
            width: 100%;
            padding: 16px;
            border-radius: var(--border-radius-md);
            font-weight: 700;
            font-size: 16px;
            margin-top: 8px;
            box-shadow: 0 8px 16px rgba(106, 208, 201, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(106, 208, 201, 0.3);
        }
        @media (min-width: 900px) {
            .auth-image { display: block; }
        }
        @media (max-width: 768px) {
            .auth-form-wrapper { padding: 32px 24px; }
        }
    </style>
    <!-- 🚀 Favicon Optimization -->
    <link rel="icon" type="image/png" sizes="32x32" href="chibi_jingliu.png">
    <link rel="icon" type="image/png" sizes="16x16" href="chibi_jingliu.png">
    <link rel="apple-touch-icon" sizes="180x180" href="chibi_jingliu.png">
    <meta name="theme-color" content="#1aa39a">

    <!-- 🚀 SEO & AI Overview Readiness -->
    <meta name="description" content="Bergabunglah dengan Jejaring Komunitas Eksklusif Castorice & Jingliu. Dapatkan koleksi artwork, diskusi lore mendalam, dan status terkini dari para Trailblazer terbaik.">
    <meta name="keywords" content="Castorice, Jingliu, Honkai Star Rail, Komunitas Trailblazer, Galeri Artwork Anime, Lore Game, Jejaring Sosial">
    <meta name="author" content="Castorice & Jingliu Administrator">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://castorice-jingliu.com/">

    <!-- 🚀 Open Graph / Facebook / WhatsApp Preview -->
    <meta property="og:type" content="website">
    <meta property="og:description" content="Jelajahi dunia Castorice dan Jingliu bersama ribuan Trailblazer lainnya.">
    <meta property="og:image" content="hero_banner.png">
    <meta property="og:site_name" content="Castorice & Jingliu Hub">

    <!-- 🚀 PageSpeed / Resource Hints -->
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://ui-avatars.com">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="header-left">
                <button class="icon-btn dark-bg" onclick="window.location.href='profile.html'" title="My Profile"><i class="ph ph-user"></i></button>
                <button class="icon-btn teal-bg" onclick="window.location.href='posting.html'" title="Create Post"><i class="ph ph-plus"></i></button>
            </div>
            <nav class="header-center">
                <a href="index.html">Home</a>
                <a href="home.html">Journey</a>
                <a href="Message.html">Message</a>
                <a href="lihatriwayat.html">History by ALFGGR</a>
            </nav>
            <div class="header-right">
                <a href="login.html" class="btn btn-outline" style="text-decoration: none;">Log in</a>
                <a href="signup.html" class="btn btn-primary" style="text-decoration: none;">Sign up</a>
            </div>
        </header>

        <main class="auth-container">
            <div class="auth-card">
                <div class="auth-form-wrapper">
                    <h2>Join the Community</h2>
                    <p>Buat akun untuk menyimpan artwork, memulai obrolan AI Castorice, dan melacak riwayat gacha-mu.</p>

                    <form id="signupForm">
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" id="regUsername" class="form-input" placeholder="Misal: trailblazer_01" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="regEmail" class="form-input" placeholder="nama@email.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="regPassword" class="form-input" placeholder="Minimal 8 karakter" required minlength="8">
                        </div>
                        <button type="submit" class="btn btn-primary btn-auth">Create Account</button>
                    </form>
                </div>
                
                <!-- Desktop Hero Image Split -->
                <div class="auth-image">
                    <img src="hero_banner.png" alt="Signup Banner">
                    <div class="auth-image-text">
                        <div style="display:inline-flex; align-items:center; gap:6px; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 12px; letter-spacing: 1px;">
                            <i class="ph-fill ph-check-circle" style="color:var(--accent-pink);"></i> EXCLUSIVE ACCESS
                        </div>
                        <h2>Memulai Perjalanan<br>Takdir Barumu.</h2>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPT DATABASE MOCK UNTUK SIGNUP -->
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman standar
            
            // Mengambil inputan user
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            // Membuka database simulasi (localStorage browser)
            let usersDB = JSON.parse(localStorage.getItem('usersDB')) || [];
            
            // Validasi apakah email sudah terpakai
            const userExists = usersDB.some(user => user.email === email);
            if (userExists) {
                alert("Pendaftaran Gagal: Email ini sudah terdaftar di sistem!");
                return;
            }

            // Menyimpan user baru ke "database"
            const newUser = { 
                id: Date.now(),
                username: username, 
                email: email, 
                password: password,
                createdAt: new Date().toLocaleDateString()
            };
            
            usersDB.push(newUser);
            localStorage.setItem('usersDB', JSON.stringify(usersDB));

            // Feedback sukses & Redirect ke Login
            alert("Berhasil! Akun " + username + " telah dibuat. Silakan melakukan Log In.");
            window.location.href = "login.html";
        });
    </script>

    <!-- CEK SUDAH LOGIN -->
    <script>
        if(localStorage.getItem('activeUser')) {
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
