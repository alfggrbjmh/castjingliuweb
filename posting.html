<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castorice & Jingliu - Komunitas</title>
    <!-- Phosphor Icons -->
    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .feed-container {
            max-width: 700px;
            margin: 40px auto;
            position: relative;
            z-index: 2;
            padding: 0 20px;
            padding-bottom: 100px;
        }

        .create-post-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: 0 12px 32px rgba(106, 208, 201, 0.1);
            margin-bottom: 32px;
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            transition: border-color 0.3s;
        }

        .create-post-card:focus-within {
            border-color: var(--primary-teal-light);
        }

        .post-header-author {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-teal);
        }

        .author-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .author-info p {
            font-size: 13px;
            color: var(--primary-teal);
            font-weight: 500;
        }

        .post-input {
            width: 100%;
            border: none;
            background: #f8fafb;
            padding: 16px;
            border-radius: var(--border-radius-md);
            font-family: inherit;
            resize: none;
            /* Cegah resize manual */
            min-height: 100px;
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 16px;
        }

        .post-input:focus {
            outline: none;
            background: var(--white);
            box-shadow: 0 0 0 2px rgba(106, 208, 201, 0.2) inset;
        }

        .post-input::placeholder {
            color: var(--text-muted);
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-icon-btns {
            display: flex;
            gap: 12px;
        }

        .action-icon-btns button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }

        .action-icon-btns button:hover {
            color: var(--primary-teal);
            transform: scale(1.1);
        }

        .btn-post {
            padding: 10px 24px;
            font-size: 15px;
            border-radius: 30px;
        }

        .timeline-divider {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            margin: 40px 0 24px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timeline-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            margin-left: 16px;
        }

        .post-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }

        .post-meta-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: auto;
        }

        .post-content-text {
            margin-top: 16px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .post-engagement {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 24px;
        }

        .engage-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .engage-btn i {
            font-size: 20px;
        }

        .engage-btn:hover {
            color: var(--accent-pink);
        }
    </style>
    <!-- 🚀 Favicon Optimization -->
    <link rel="icon" type="image/png" sizes="32x32" href="chibi_jingliu.png">
    <link rel="icon" type="image/png" sizes="16x16" href="chibi_jingliu.png">
    <link rel="apple-touch-icon" sizes="180x180" href="chibi_jingliu.png">
    <meta name="theme-color" content="#1aa39a">

    <!-- 🚀 SEO & AI Overview Readiness -->
    <meta name="description"
        content="Bergabunglah dengan Jejaring Komunitas Eksklusif Castorice & Jingliu. Dapatkan koleksi artwork, diskusi lore mendalam, dan status terkini dari para Trailblazer terbaik.">
    <meta name="keywords"
        content="Castorice, Jingliu, Honkai Star Rail, Komunitas Trailblazer, Galeri Artwork Anime, Lore Game, Jejaring Sosial">
    <meta name="author" content="Castorice & Jingliu Administrator">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://castorice-jingliu.com/">

    <!-- 🚀 Open Graph / Facebook / WhatsApp Preview -->
    <meta property="og:type" content="website">
    <meta property="og:description" content="Jelajahi dunia Castorice dan Jingliu bersama ribuan Trailblazer lainnya.">
    <meta property="og:image" content="hero_banner.png">
    <meta property="og:site_name" content="Castorice & Jingliu Hub">

    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://ui-avatars.com">
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="header-left">
                <button class="icon-btn dark-bg" onclick="window.location.href='profile.html'" title="My Profile"><i
                        class="ph ph-user"></i></button>
                <button class="icon-btn teal-bg" onclick="window.location.href='posting.html'" title="New Post"><i
                        class="ph ph-plus"></i></button>
            </div>
            <nav class="header-center">
                <a href="index.html">Home</a>
                <a href="home.html">Journey</a>
                <a href="Message.html">Message</a>
                <a href="lihatriwayat.html">History</a>
            </nav>
            <div class="header-right">
                <!-- Akan diganti oleh Auth Script -->
            </div>
        </header>

        <main class="feed-container">


            <!-- Form Buat Post Baru -->
            <div class="create-post-card">
                <div class="post-header-author">
                    <img src="" alt="Profile" class="author-avatar" id="activeUserAvatar">
                    <div class="author-info">
                        <h3 id="activeUserName">Trailblazer</h3>
                        <p>Apa yang ada di pikiranmu hari ini?</p>
                    </div>
                </div>

                <textarea class="post-input" id="postInputText"
                    placeholder="Bagikan hasil gacha, artwork, atau pengalamanmu..."></textarea>

                <!-- Preview area untuk gambar & tautan -->
                <div id="attachedPreview"
                    style="display:none; margin-bottom: 20px; align-items:flex-start; gap: 12px; padding: 12px; background: #f8fafb; border-radius: var(--border-radius-md);">
                    <img id="previewImage" src=""
                        style="height: 80px; width: 80px; object-fit: cover; border-radius: 8px; display: none;">
                    <div id="previewLink"
                        style="font-size:13px; color:var(--primary-teal); font-weight: 600; word-break:break-all; flex: 1; display:none; padding-top: 8px;">
                    </div>
                    <button onclick="clearAttachments()"
                        style="background:none; border:none; color:#ea4335; font-size:20px; cursor:pointer;"

                </div>

                <div class="post-actions">
                    <div class="action-icon-btns">
                        <input type="file" id="imageUploader" accept="image/*" style="display:none;">
                        <button title="Unggah Gambar" onclick="document.getElementById('imageUploader').click()"><i
                                class="ph ph-image"></i></button>
                        <button title="Bagikan Tautan" onclick="attachLink()"><i class="ph ph-link"></i></button>
                        <button title="Sematkan Emotikon" onclick="alert('Fitur emotikon akan segera hadir!')"><i

            <div class="timeline-divider">Gacha Timeline</div>

            <!-- Tempat Render Feed Post -->
            <div class="post-feed" id="postFeed">
                <!-- Posting Statis Default sebagai contoh -->
                <div class="post-card">
                    <div class="post-header-author" style="margin-bottom: 0;">
                        <img src="chibi_jingliu.png" alt="Jingliu" class="author-avatar" style="border-color: #fafdfd">
                        <div class="author-info">
                            <h3>Jingliu Official</h3>
                            <p style="color: var(--text-muted); font-size: 12px;">Admin</p>
                        </div>
                        <div class="post-meta-time">2 Jam yang lalu</div>
                    </div>
                    <div class="post-content-text">
                        Selamat datang semuanya! Jangan ragu untuk membagikan pencapaian gacha maupun fan-art Castorice
                        & Jingliu kalian di halaman komunitas ini.
                    </div>
                    <div class="post-engagement">
                        <button class="engage-btn"><i class="ph ph-heart"></i> 99+</button>
                        <button class="engage-btn"><i class="ph ph-chat-circle"></i> 12</button>
                    </div>
                </div>
            </div>

        </main>

    <!-- LOGIC SYSTEM & DB UNTUK POSTING -->
    <!-- Firebase SDK v10 (compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // ===  KONTROL DATABASE & SISTEM SOSIAL  ===
        // ==========================================
        
        // Konfigurasi Firebase (Ganti jika sudah punya akun Firebase)
        const firebaseConfig = {
            apiKey: "GANTI_API_KEY",
            authDomain: "GANTI.firebaseapp.com",
            databaseURL: "https://GANTI-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "GANTI_PROJECT_ID",
            storageBucket: "GANTI.appspot.com",
            messagingSenderId: "GANTI",
            appId: "GANTI"
        };

        // Deteksi Mode (Cloud atau Lokal)
        window.isFirebaseSetup = firebaseConfig.apiKey !== "GANTI_API_KEY";
        window.currentPostsList = [];

        if (window.isFirebaseSetup) {
            try {
                firebase.initializeApp(firebaseConfig);
                window.fbDB = firebase.database();
                window.postsRef = window.fbDB.ref('posts');
            } catch (e) { console.error("Firebase Gagal:", e); }
        }

        // --- SISTEM NOTIFIKASI ---
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            const icon = isError ? '<i class="ph-fill ph-warning-circle" style="color:#ea4335; font-size:24px;"></i>' : '<i class="ph-fill ph-check-circle" style="color:#20b2aa; font-size:24px;"></i>';
            toast.innerHTML = `<div style="display:flex;align-items:center;gap:12px;">${icon}<span style="font-size:14px;font-weight:600;color:#1e293b;">${message}</span></div>`;
            toast.style = "position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(100px); background:white; padding:16px 24px; border-radius:50px; box-shadow:0 12px 32px rgba(0,0,0,0.12); border:1px solid rgba(0,0,0,0.05); z-index:9999; opacity:0; transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);";
            document.body.appendChild(toast);
            requestAnimationFrame(() => { toast.style.transform = 'translateX(-50%) translateY(0)'; toast.style.opacity = '1'; });
            setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(100px)'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        // --- KONTROL MENU TITIK 3 ---
        function toggleMenu(menuId) {
            const el = document.getElementById(menuId);
            if (!el) return;
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('[id^="post-menu-"]').forEach(m => m.style.display = 'none');
            if (!isVisible) {
                el.style.display = 'block';
                el.style.zIndex = '1000';
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.post-menu-wrapper')) {
                document.querySelectorAll('[id^="post-menu-"]').forEach(m => m.style.display = 'none');
            }
        });

        // --- FITUR LIKE (HYBRID) ---
        function toggleLike(firebaseKey) {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) { showToast('Silakan login dulu!', true); return; }

            if (window.isFirebaseSetup && window.postsRef) {
                const likeRef = window.postsRef.child(firebaseKey).child('likedBy').child(activeUser.username);
                likeRef.once('value').then(snap => { if (snap.val()) likeRef.remove(); else likeRef.set(true); });
            } else {
                let localDB = JSON.parse(localStorage.getItem('postsDB')) || [];
                const idx = localDB.findIndex(p => p.firebaseKey === firebaseKey);
                if (idx > -1) {
                    if (!localDB[idx].likedBy) localDB[idx].likedBy = {};
                    if (localDB[idx].likedBy[activeUser.username]) delete localDB[idx].likedBy[activeUser.username];
                    else localDB[idx].likedBy[activeUser.username] = true;
                    localStorage.setItem('postsDB', JSON.stringify(localDB));
                    window.renderPosts(localDB);
                }
            }
        }

        // --- FITUR KOMENTAR (HYBRID) ---
        function submitInlineComment(firebaseKey) {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) { showToast('Silakan login dulu!', true); return; }
            const inputEl = document.getElementById('commentInput_' + firebaseKey);
            const text = inputEl.value.trim();
            if (!text) return;

            const cleanText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            if (window.isFirebaseSetup && window.postsRef) {
                window.postsRef.child(firebaseKey).child('comments').push({ author: activeUser.username, text: cleanText }).then(() => { inputEl.value = ''; });
            } else {
                let localDB = JSON.parse(localStorage.getItem('postsDB')) || [];
                const idx = localDB.findIndex(p => p.firebaseKey === firebaseKey);
                if (idx > -1) {
                    if (!localDB[idx].comments) localDB[idx].comments = {};
                    localDB[idx].comments['c-' + Date.now()] = { author: activeUser.username, text: cleanText };
                    localStorage.setItem('postsDB', JSON.stringify(localDB));
                    inputEl.value = '';
                    window.renderPosts(localDB);
                }
            }
        }

        // --- FITUR HAPUS & EDIT (HYBRID) ---
        function deletePost(key) {
            if (!confirm('Hapus postingan?')) return;
            if (window.isFirebaseSetup && window.postsRef) {
                window.postsRef.child(key).remove().then(() => showToast('Terhapus dari Cloud'));
            } else {
                let localDB = JSON.parse(localStorage.getItem('postsDB')) || [];
                localDB = localDB.filter(p => p.firebaseKey !== key);
                localStorage.setItem('postsDB', JSON.stringify(localDB));
                window.renderPosts(localDB);
                showToast('Terhapus secara lokal');
            }
        }

        function editPost(key) {
            const list = window.currentPostsList || JSON.parse(localStorage.getItem('postsDB')) || [];
            const post = list.find(p => p.firebaseKey === key);
            if (!post) return;
            const content = prompt("Edit postingan Anda:", post.content.replace(/&lt;/g,'<').replace(/&gt;/g,'>'));
            if (content !== null && content.trim() !== "") {
                const clean = content.replace(/</g,'&lt;').replace(/>/g,'&gt;');
                if (window.isFirebaseSetup && window.postsRef) {
                    window.postsRef.child(key).update({ content: clean }).then(() => showToast('Diperbarui!'));
                } else {
                    let localDB = JSON.parse(localStorage.getItem('postsDB')) || [];
                    const idx = localDB.findIndex(p => p.firebaseKey === key);
                    if (idx > -1) {
                        localDB[idx].content = clean;
                        localStorage.setItem('postsDB', JSON.stringify(localDB));
                        window.renderPosts(localDB);
                        showToast('Berhasil Edit (Lokal)');
                    }
                }
            }
        }

        function shareLink(name) {
            const url = window.location.origin + window.location.pathname + "?komunitas_castorice_dari=" + encodeURIComponent(name);
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Tautan berhasil disalin!');
        }

        // Sesi Aktif Check
        const activeUserStr = localStorage.getItem('activeUser');
        let activeUserObj = activeUserStr ? JSON.parse(activeUserStr) : null;


        document.addEventListener("DOMContentLoaded", function () {
            const activeUserStr = localStorage.getItem('activeUser');
            if (activeUserStr) {
                activeUserObj = JSON.parse(activeUserStr);

                const headerRight = document.querySelector('.header-right');
                if (headerRight) {
                    headerRight.innerHTML = `
                        <div style="display:flex; align-items:center; gap:16px;">
                            <a href="profile.html" style="font-weight:800; font-size:15px; color:var(--text-dark); text-decoration:none; transition: color 0.2s;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-dark)'">
                                <i class="ph-fill ph-user-circle" style="color:var(--primary-teal); font-size:22px; vertical-align:-5px; margin-right:4px;"></i> 
                                ${activeUserObj.username}
                            </a>
                            <button onclick="logout()" class="btn btn-outline" style="padding: 10px 24px; font-size: 14px; border-color: rgba(0,0,0,0.1);">Log out</button>
                        </div>
                    `;
                }

                // Set Info Penulis di Form Create Post
                document.getElementById('activeUserName').innerText = activeUserObj.username;
                document.getElementById('activeUserAvatar').src = activeUserObj.avatar ? activeUserObj.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(activeUserObj.username)}&background=1aa39a&color=fff&size=128`;
            } else {
                // GUEST MODE
                const headerRight = document.querySelector('.header-right');
                if (headerRight) {
                    headerRight.innerHTML = `
                        <a href="login.html" class="btn btn-outline" style="text-decoration: none;">Log in</a>
                        <a href="signup.html" class="btn btn-primary" style="text-decoration: none;">Sign up</a>
                    `;
                }

                // Hide Create Post card for guests
                const createCard = document.querySelector('.create-post-card');
                if (createCard) createCard.style.display = 'none';

                // Hide Create Post button in header-left for guest
                const createBtn = document.querySelector('.icon-btn.teal-bg');
                if (createBtn) createBtn.style.display = 'none';
            }

            // Cek URL Query untuk filter profil akun spesifik
            const urlParams = new URLSearchParams(window.location.search);
            const authorQuery = urlParams.get('komunitas_castorice_dari');

            if (isFirebaseSetup) {
                // Tampilkan loading skeleton hanya jika pakai Firebase
                document.getElementById('postFeed').innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-muted);"><i class="ph-bold ph-spinner" style="font-size:32px;animation:spin 1s linear infinite;"></i><p style="margin-top:12px;font-weight:600;">Memuat dari Cloud Database...</p></div>`;

                // Dengarkan perubahan data Firebase secara realtime
                postsRef.orderByChild('timestamp').on('value', function(snapshot) {
                    const postsData = snapshot.val();
                    let postsList = [];
                    if (postsData) {
                        postsList = Object.entries(postsData).map(([key, val]) => ({ firebaseKey: key, ...val }));
                        postsList.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    }
                    window.currentPostsList = postsList;
                    window.renderPosts(postsList, null, authorQuery);
                }, function(error) {
                    document.getElementById('postFeed').innerHTML = `<div style="text-align:center;padding:60px;color:#ea4335;"><i class="ph-bold ph-warning-circle" style="font-size:32px;"></i><p style="margin-top:12px;font-weight:600;">Gagal terhubung ke Database Cloud.</p></div>`;
                });
            } else {
                // FALLBACK: Gunakan LocalStorage Jika Firebase Belum di-Config
                console.log("Firebase belum di-setup. Menggunakan database lokal (LocalStorage).");
                const localPosts = JSON.parse(localStorage.getItem('postsDB')) || [
                    { firebaseKey: 'local-1', authorName: "Jingliu Official", content: "Mode Database Lokal Aktif. Silakan setup Firebase di posting.html untuk mode Online. #Jingliu #Castorice", time: "Baru saja", likedBy: {}, comments: {} },
                    { firebaseKey: 'local-2', authorName: "Castorice Admin", content: "Keajaiban Kuantum sedang menunggumu. #GachaLife", time: "3 jam yang lalu", image: "hero_banner.png", likedBy: {}, comments: {} }
                ];
                renderPosts(localPosts, null, authorQuery);
            }
        });

        function logout() {
            localStorage.removeItem('activeUser');
            window.location.href = "login.html";
        }



        // Variabel penampung file dan tautan - Jadikan Global agar terbaca database.js
        window.pendingImage = null;
        window.pendingLink = null;

        // Baca Gambar ke Base64 saat diupload
        document.getElementById('imageUploader').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                window.pendingImage = event.target.result;
                document.getElementById('attachedPreview').style.display = 'flex';
                document.getElementById('previewImage').style.display = 'block';
                document.getElementById('previewImage').src = window.pendingImage;
            };
            reader.readAsDataURL(file);
        });

        // Prompt input tautan
        window.attachLink = function() {
            const url = prompt("Masukkan Tautan (URL) menarik yang ingin Anda bagikan:", "https://");
            if (url && url.length > 8) {
                window.pendingLink = url;
                document.getElementById('attachedPreview').style.display = 'flex';
                document.getElementById('previewLink').style.display = 'block';
                document.getElementById('previewLink').innerHTML = `<i class="ph-bold ph-link" style="vertical-align: -2px;"></i> ${window.pendingLink}`;
            }
        }

        // Hapus attachment batal
        window.clearAttachments = function() {
            window.pendingImage = null;
            window.pendingLink = null;
            document.getElementById('imageUploader').value = '';
            document.getElementById('attachedPreview').style.display = 'none';
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewLink').style.display = 'none';
        }

        // Membungkus handle comment enter ke global
        window.handleCommentEnter = function(e, firebaseKey) {
            if (e.key === 'Enter') {
                e.preventDefault();
                window.submitInlineComment(firebaseKey);
            }
        };



        // Helper menguraikan Hashtag menjadi elemen klikabel
        function formatHashtags(text) {
            return text.replace(/#(\w+)/g, '<span class="hashtag" onclick="renderPosts(\'$1\')" style="color: var(--primary-teal); cursor: pointer; font-weight: 600; text-decoration: none;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">#$1</span>');
        }

        // Fungsi mencetak postingan ke layar (dipanggil dari Firebase listener)
        window.renderPosts = function(postsList, filterTag = null, filterAuthor = null) {
            const feedContainer = document.getElementById('postFeed');
            const usersDB = JSON.parse(localStorage.getItem('usersDB')) || [];

            let allHtml = '';

            let postsToRender = postsList;
            
            if (filterAuthor) {
                postsToRender = postsToRender.filter(p => p.authorName === filterAuthor);
                allHtml += `
                    <div style="background: #f1f9fa; padding: 16px 20px; border-radius: 12px; margin-bottom: 24px; border: 1px dashed var(--primary-teal); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; color: var(--primary-teal); font-size: 14px;"><i class="ph-bold ph-user" style="vertical-align:-2px;"></i> Melirik Postingan dari Akun: ${filterAuthor}</span>
                        <button onclick="window.location.href='posting.html'" style="background: var(--primary-teal); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700;"><i class="ph-bold ph-list"></i> Lihat Semua Timeline</button>
                    </div>
                `;
                if (postsToRender.length === 0) {
                    allHtml += `<div style="text-align:center; padding:40px; color:var(--text-muted); font-weight:600;">Belum ada postingan dari akun ini.</div>`;
                }
            } else if (filterTag) {
                postsToRender = postsToRender.filter(p => p.content && p.content.includes('#' + filterTag));
                allHtml += `
                    <div style="background: #f1f9fa; padding: 16px 20px; border-radius: 12px; margin-bottom: 24px; border: 1px dashed var(--primary-teal); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; color: var(--primary-teal); font-size: 14px;"><i class="ph-bold ph-hash" style="vertical-align:-2px;"></i> Hasil Pencarian: #${filterTag}</span>
                        <button onclick="window.location.href='posting.html'" style="background: var(--primary-teal); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700;"><i class="ph-bold ph-x"></i> Hapus Filter</button>
                    </div>
                `;
            }

            postsToRender.forEach(post => {
                const authorUser = usersDB.find(u => u.username === post.authorName);
                const avatar = (post.authorAvatar && post.authorAvatar !== '') ? post.authorAvatar : (authorUser && authorUser.avatar ? authorUser.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(post.authorName)}&background=38495a&color=fff`);

                // Firebase simpan likedBy sebagai object {username: true}
                const likedByObj = post.likedBy || {};
                const isLiked = activeUserObj && likedByObj[activeUserObj.username] === true;
                const heartClass = isLiked ? 'ph-fill ph-heart' : 'ph ph-heart';
                const heartStyle = isLiked ? 'color: var(--accent-pink);' : '';
                const likeCount = Object.keys(likedByObj).length;

                // Firebase simpan comments sebagai object {key: {author, text}}
                const commentsObj = post.comments || {};
                const commentsList = Object.entries(commentsObj).map(([k, v]) => ({ key: k, ...v }));
                const commentCount = commentsList.length;

                let commentsHtml = '<div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 12px;">';

                commentsList.forEach((c, cIndex) => {
                    const commenterUser = usersDB.find(u => u.username === c.author);
                    const cAvatar = commenterUser && commenterUser.avatar ? commenterUser.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(c.author)}&background=1aa39a&color=fff`;
                    commentsHtml += `
                        <div style="background: #f8fafb; padding: 12px; border-radius: 8px; display: flex; gap: 12px; align-items:flex-start;">
                            <img src="${cAvatar}" style="width: 24px; height: 24px; border-radius: 50%;">
                            <div style="flex: 1;">
                                <div style="font-weight: 700; font-size: 13px; color: var(--text-dark); margin-bottom: 2px;">${c.author}</div>
                                <div style="font-size: 13px; color: var(--text-dark); line-height: 1.4;" id="comment-text-${post.firebaseKey}-${cIndex}">${c.text}</div>
                            </div>
                            <div class="comment-menu" style="position: relative;">
                                <button onclick="toggleMenu('menu-${post.firebaseKey}-${cIndex}')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding: 4px;">
                                    <i class="ph-bold ph-dots-three" style="font-size: 20px;"></i>
                                </button>
                                <div id="menu-${post.firebaseKey}-${cIndex}" style="display:none; position: absolute; right: 0; top: 100%; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; min-width: 140px;">
                                    ${activeUserObj && c.author === activeUserObj.username ? `<button onclick="deleteComment('${post.firebaseKey}','${c.key}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:#ea4335; border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-trash"></i> Hapus</button>` : ''}
                                    <button onclick="copyComment('${post.firebaseKey}-${cIndex}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-copy"></i> Salin</button>
                                    <button onclick="shareLink('${c.author}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-share-network"></i> Bagikan</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                if (activeUserObj) {
                    const myAvatar = activeUserObj.avatar ? activeUserObj.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(activeUserObj.username)}&background=38495a&color=fff`;
                    commentsHtml += `
                        <div style="display: flex; gap: 10px; align-items: center; margin-top: 4px;">
                            <img src="${myAvatar}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                            <input type="text" id="commentInput_${post.firebaseKey}" placeholder="Tulis balasanmu..." style="flex: 1; padding: 10px 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 30px; font-size: 13px; font-family: inherit; background: #f8fafb; outline: none; transition: all 0.2s;" onfocus="this.style.borderColor='var(--primary-teal)'; this.style.backgroundColor='var(--white)'" onblur="this.style.borderColor='rgba(0,0,0,0.1)'; this.style.backgroundColor='#f8fafb'" onkeypress="handleCommentEnter(event, '${post.firebaseKey}')">
                            <button onclick="submitInlineComment('${post.firebaseKey}')" style="background: var(--primary-teal); color: var(--white); border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;" title="Kirim Balasan"><i class="ph-bold ph-paper-plane-right"></i></button>
                        </div>
                    </div>`;
                } else {
                    commentsHtml += `
                        <div style="margin-top: 8px; text-align: center; padding: 12px; background: #f8fafb; border-radius: 30px; border: 1px dashed rgba(0,0,0,0.1);">
                            <a href="login.html" style="font-size: 12px; color: var(--primary-teal); text-decoration: none; font-weight: 700;">Masuk untuk memberikan komentar & suka</a>
                        </div>
                    </div>`;
                }

                let mediaHtml = '';
                if (post.image) mediaHtml += `<img src="${post.image}" style="width:100%; max-height:460px; object-fit:cover; border-radius:12px; margin-top:16px;">`;
                if (post.link) mediaHtml += `<a href="${post.link}" target="_blank" style="display:flex; align-items:center; gap:8px; color:var(--primary-teal); font-weight:700; text-decoration:none; background:#f1f9fa; padding:12px 16px; border-radius:8px; margin-top:12px; border: 1px solid rgba(106,208,201,0.2);"><i class="ph-bold ph-arrow-square-out" style="font-size: 20px;"></i> Buka Tautan Eksternal</a>`;

                const timeLabel = post.timestamp ? new Date(post.timestamp).toLocaleString('id-ID', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Baru saja';

                allHtml += `
                    <div class="post-card">
                        <div class="post-header-author" style="margin-bottom: 0;">
                            <img src="${avatar}" alt="${post.authorName}" class="author-avatar" style="border-color: #f1f9fa; object-fit: cover;">
                            <div class="author-info">
                                <h3>${post.authorName}</h3>
                                <p style="color: var(--text-muted); font-size: 12px;">Trailblazer</p>
                            </div>
                            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                                <div class="post-meta-time" style="margin-left: 0;">${timeLabel}</div>
                                <div class="post-menu-wrapper" style="position: relative;">
                                    <button onclick="toggleMenu('post-menu-${post.firebaseKey}')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding: 4px; transition: color 0.2s; display: flex;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-muted)'">
                                        <i class="ph-bold ph-dots-three" style="font-size: 24px;"></i>
                                    </button>
                                    
                                    <div id="post-menu-${post.firebaseKey}" style="display:none; position: absolute; right: 0; top: 100%; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; min-width: 140px;">
                                        ${activeUserObj && post.authorName === activeUserObj.username ? `
                                            <button onclick="editPost('${post.firebaseKey}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-pencil-simple"></i> Edit</button>
                                            <button onclick="deletePost('${post.firebaseKey}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:#ea4335; border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-trash"></i> Hapus</button>
                                        ` : ''}
                                        <button onclick="shareLink('${post.authorName}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); display:flex; align-items:center; gap:8px;"><i class="ph-bold ph-share-network"></i> Bagikan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="post-content-text">
                            ${formatHashtags(post.content)}
                            ${mediaHtml}
                        </div>
                        <div class="post-engagement">
                            <button class="engage-btn" onclick="${activeUserObj ? `toggleLike('${post.firebaseKey}')` : `window.location.href='login.html'`}" style="${heartStyle}"><i class="${heartClass}"></i> <span class="like-count">${likeCount}</span></button>
                            <button class="engage-btn" onclick="${activeUserObj ? `document.getElementById('commentInput_${post.firebaseKey}').focus()` : `window.location.href='login.html'`}"><i class="ph ph-chat-circle"></i> ${commentCount}</button>
                        </div>
                        ${commentsHtml}
                    </div>
                `;
            });

            // Post default selalu di ujung paling bawah, hanya render jika tidak difilter
            if (!filterTag && !filterAuthor) {
                allHtml += `
                    <div class="post-card border-glow">
                        <div class="post-header-author" style="margin-bottom: 0;">
                            <img src="chibi_jingliu.png" alt="Jingliu" class="author-avatar" style="border-color: var(--accent-pink);">
                            <div class="author-info">
                                <h3>Jingliu Official <i class="ph-fill ph-check-circle" style="color: var(--primary-teal);"></i></h3>
                                <p style="color: var(--text-muted); font-size: 12px;">Admin</p>
                            </div>
                            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                                <div class="post-meta-time" style="margin-left: 0;">2 April 2026</div>
                                <div class="post-menu-wrapper" style="position: relative;">
                                    <button onclick="toggleMenu('post-menu-jingliu')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding: 4px; transition: color 0.2s; display: flex;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-muted)'">
                                        <i class="ph-bold ph-dots-three" style="font-size: 24px;"></i>
                                    </button>
                                    <div id="post-menu-jingliu" style="display:none; position: absolute; right: 0; top: 100%; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; min-width: 140px;">
                                        <button onclick="shareLink('Jingliu Official')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-share-network"></i> Bagikan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="post-content-text">
                            ${formatHashtags("Selamat datang di dinding komunitas! Jangan ragu untuk membagikan perasaanmu atau hasil #gacha terbarumu di sini.")}
                        </div>
                        <div class="post-engagement">
                            <button class="engage-btn" style="color: var(--accent-pink);"><i class="ph-fill ph-heart"></i> 9,999</button>
                        </div>
                    </div>
                `;
            }

            feedContainer.innerHTML = allHtml;
        }
    </script>
</body>

</html>
