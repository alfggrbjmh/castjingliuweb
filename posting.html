<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castorice & Jingliu - Komunitas</title>
    <!-- Phosphor Icons -->
    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .feed-container {
            max-width: 700px;
            margin: 40px auto;
            position: relative;
            z-index: 2;
            padding: 0 20px;
            padding-bottom: 100px;
        }
        .create-post-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: 0 12px 32px rgba(106, 208, 201, 0.1);
            margin-bottom: 32px;
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            transition: border-color 0.3s;
        }
        .create-post-card:focus-within {
            border-color: var(--primary-teal-light);
        }
        .post-header-author {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-teal);
        }
        .author-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .author-info p {
            font-size: 13px;
            color: var(--primary-teal);
            font-weight: 500;
        }
        .post-input {
            width: 100%;
            border: none;
            background: #f8fafb;
            padding: 16px;
            border-radius: var(--border-radius-md);
            font-family: inherit;
            resize: none; /* Cegah resize manual */
            min-height: 100px;
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 16px;
        }
        .post-input:focus {
            outline: none;
            background: var(--white);
            box-shadow: 0 0 0 2px rgba(106, 208, 201, 0.2) inset;
        }
        .post-input::placeholder {
            color: var(--text-muted);
        }
        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .action-icon-btns {
            display: flex;
            gap: 12px;
        }
        .action-icon-btns button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .action-icon-btns button:hover {
            color: var(--primary-teal);
            transform: scale(1.1);
        }
        .btn-post {
            padding: 10px 24px;
            font-size: 15px;
            border-radius: 30px;
        }
        
        .timeline-divider {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            margin: 40px 0 24px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .timeline-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-left: 16px;
        }

        .post-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.08);
        }
        .post-meta-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: auto;
        }
        .post-content-text {
            margin-top: 16px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark);
        }
        .post-engagement {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 24px;
        }
        .engage-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        .engage-btn i { font-size: 20px; }
        .engage-btn:hover { color: var(--accent-pink); }
    </style>
    <!-- 🚀 Favicon Optimization -->
    <link rel="icon" type="image/png" sizes="32x32" href="chibi_jingliu.png">
    <link rel="icon" type="image/png" sizes="16x16" href="chibi_jingliu.png">
    <link rel="apple-touch-icon" sizes="180x180" href="chibi_jingliu.png">
    <meta name="theme-color" content="#1aa39a">

    <!-- 🚀 SEO & AI Overview Readiness -->
    <meta name="description" content="Bergabunglah dengan Jejaring Komunitas Eksklusif Castorice & Jingliu. Dapatkan koleksi artwork, diskusi lore mendalam, dan status terkini dari para Trailblazer terbaik.">
    <meta name="keywords" content="Castorice, Jingliu, Honkai Star Rail, Komunitas Trailblazer, Galeri Artwork Anime, Lore Game, Jejaring Sosial">
    <meta name="author" content="Castorice & Jingliu Administrator">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://castorice-jingliu.com/">

    <!-- 🚀 Open Graph / Facebook / WhatsApp Preview -->
    <meta property="og:type" content="website">
    <meta property="og:description" content="Jelajahi dunia Castorice dan Jingliu bersama ribuan Trailblazer lainnya.">
    <meta property="og:image" content="hero_banner.png">
    <meta property="og:site_name" content="Castorice & Jingliu Hub">

    <!-- 🚀 PageSpeed / Resource Hints -->
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://ui-avatars.com">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="header-left">
                <button class="icon-btn dark-bg" onclick="window.location.href='profile.html'" title="My Profile"><i class="ph ph-user"></i></button>
                <button class="icon-btn teal-bg" onclick="window.location.href='posting.html'" title="New Post"><i class="ph ph-plus"></i></button>
            </div>
            <nav class="header-center">
                <a href="index.html">Home</a>
                <a href="home.html">Journey</a>
                <a href="Message.html">Message</a>
                <a href="lihatriwayat.html">History by ALFGGR</a>
            </nav>
            <div class="header-right">
                <!-- Akan diganti oleh Auth Script -->
            </div>
        </header>

        <main class="feed-container">
            <!-- Form Buat Post Baru -->
            <div class="create-post-card">
                <div class="post-header-author">
                    <img src="" alt="Profile" class="author-avatar" id="activeUserAvatar">
                    <div class="author-info">
                        <h3 id="activeUserName">Trailblazer</h3>
                        <p>Apa yang ada di pikiranmu hari ini?</p>
                    </div>
                </div>
                
                <textarea class="post-input" id="postInputText" placeholder="Bagikan hasil gacha, artwork, atau pengalamanmu..."></textarea>
                
                <!-- Preview area untuk gambar & tautan -->
                <div id="attachedPreview" style="display:none; margin-bottom: 20px; align-items:flex-start; gap: 12px; padding: 12px; background: #f8fafb; border-radius: var(--border-radius-md);">
                    <img id="previewImage" src="" style="height: 80px; width: 80px; object-fit: cover; border-radius: 8px; display: none;">
                    <div id="previewLink" style="font-size:13px; color:var(--primary-teal); font-weight: 600; word-break:break-all; flex: 1; display:none; padding-top: 8px;"></div>
                    <button onclick="clearAttachments()" style="background:none; border:none; color:#ea4335; font-size:20px; cursor:pointer;" title="Hapus Lampiran"><i class="ph-fill ph-x-circle"></i></button>
                </div>

                <div class="post-actions">
                    <div class="action-icon-btns">
                        <input type="file" id="imageUploader" accept="image/*" style="display:none;">
                        <button title="Unggah Gambar" onclick="document.getElementById('imageUploader').click()"><i class="ph ph-image"></i></button>
                        <button title="Bagikan Tautan" onclick="attachLink()"><i class="ph ph-link"></i></button>
                        <button title="Sematkan Emotikon" onclick="alert('Fitur emotikon akan segera hadir!')"><i class="ph ph-smiley"></i></button>
                    </div>
                    <button class="btn btn-primary btn-post" onclick="submitPost()">Kirim Posting</button>
                </div>
            </div>

            <div class="timeline-divider">Gacha Timeline</div>

            <!-- Tempat Render Feed Post -->
            <div class="post-feed" id="postFeed">
                <!-- Posting Statis Default sebagai contoh -->
                <div class="post-card">
                    <div class="post-header-author" style="margin-bottom: 0;">
                        <img src="chibi_jingliu.png" alt="Jingliu" class="author-avatar" style="border-color: #fafdfd">
                        <div class="author-info">
                            <h3>Jingliu Official</h3>
                            <p style="color: var(--text-muted); font-size: 12px;">Admin</p>
                        </div>
                        <div class="post-meta-time">2 Jam yang lalu</div>
                    </div>
                    <div class="post-content-text">
                        Selamat datang semuanya! Jangan ragu untuk membagikan pencapaian gacha maupun fan-art Castorice & Jingliu kalian di halaman komunitas ini.
                    </div>
                    <div class="post-engagement">
                        <button class="engage-btn"><i class="ph ph-heart"></i> 99+</button>
                        <button class="engage-btn"><i class="ph ph-chat-circle"></i> 12</button>
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <!-- LOGIC SYSTEM & DB UNTUK POSTING -->
    <script>
        // 1. Proteksi Halaman (Auth Guard)
        if(!localStorage.getItem('activeUser')) {
            window.location.replace("login.html");
        }

        let activeUserObj = null;

        document.addEventListener("DOMContentLoaded", function() {
            const activeUserStr = localStorage.getItem('activeUser');
            if(activeUserStr) {
                activeUserObj = JSON.parse(activeUserStr);
                
                // Set Header Kanan
                const headerRight = document.querySelector('.header-right');
                if(headerRight) {
                    headerRight.innerHTML = `
                        <div style="display:flex; align-items:center; gap:16px;">
                            <a href="profile.html" style="font-weight:800; font-size:15px; color:var(--text-dark); text-decoration:none; transition: color 0.2s;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-dark)'">
                                <i class="ph-fill ph-user-circle" style="color:var(--primary-teal); font-size:22px; vertical-align:-5px; margin-right:4px;"></i> 
                                ${activeUserObj.username}
                            </a>
                            <button onclick="logout()" class="btn btn-outline" style="padding: 10px 24px; font-size: 14px; border-color: rgba(0,0,0,0.1);">Log out</button>
                        </div>
                    `;
                }

                // Set Info Penulis di Form Create Post
                document.getElementById('activeUserName').innerText = activeUserObj.username;
                document.getElementById('activeUserAvatar').src = activeUserObj.avatar ? activeUserObj.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(activeUserObj.username)}&background=1aa39a&color=fff&size=128`;
                
                // Render postingan dari Local Storage
                renderPosts();
            }
        });

        function logout() {
            localStorage.removeItem('activeUser');
            window.location.href = "login.html";
        }

        // Variabel penampung file dan tautan
        let pendingImage = null;
        let pendingLink = null;

        // Baca Gambar ke Base64 saat diupload
        document.getElementById('imageUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                pendingImage = event.target.result;
                document.getElementById('attachedPreview').style.display = 'flex';
                document.getElementById('previewImage').style.display = 'block';
                document.getElementById('previewImage').src = pendingImage;
            };
            reader.readAsDataURL(file);
        });

        // Prompt input tautan
        function attachLink() {
            const url = prompt("Masukkan Tautan (URL) menarik yang ingin Anda bagikan:", "https://");
            if(url && url.length > 8) {
                pendingLink = url;
                document.getElementById('attachedPreview').style.display = 'flex';
                document.getElementById('previewLink').style.display = 'block';
                document.getElementById('previewLink').innerHTML = `<i class="ph-bold ph-link" style="vertical-align: -2px;"></i> ${pendingLink}`;
            }
        }

        // Hapus attachment batal
        function clearAttachments() {
            pendingImage = null;
            pendingLink = null;
            document.getElementById('imageUploader').value = '';
            document.getElementById('attachedPreview').style.display = 'none';
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewLink').style.display = 'none';
        }

        // Logic Posting
        function submitPost() {
            const textArea = document.getElementById('postInputText');
            const textContent = textArea.value.trim();
            
            if(!textContent && !pendingImage && !pendingLink) {
                alert("Kamu belum menuliskan teks ataupun melampirkan foto / tautan sama sekali!");
                return;
            }

            // Membuka database sosial dari Local Storage
            let postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
            
            // Format Data Postingan Baru
            const newPost = {
                id: Date.now(),
                authorName: activeUserObj.username,
                content: textContent.replace(/</g, "&lt;").replace(/>/g, "&gt;"), // Basic anti-XSS
                image: pendingImage,
                link: pendingLink,
                time: "Baru saja",
                likedBy: [],
                comments: []
            };

            // Masukkan ke array paling atas (unshift) dan simpan kembali
            postsDB.unshift(newPost);
            localStorage.setItem('postsDB', JSON.stringify(postsDB));

            // Bersihkan form text, media, dan render ulang feed
            textArea.value = '';
            clearAttachments();
            renderPosts();
        }

        // Helper menguraikan Hashtag menjadi elemen klikabel
        function formatHashtags(text) {
            return text.replace(/#(\w+)/g, '<span class="hashtag" onclick="renderPosts(\'$1\')" style="color: var(--primary-teal); cursor: pointer; font-weight: 600; text-decoration: none;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">#$1</span>');
        }

        // Fungsi mencetak postingan ke layar
        function renderPosts(filterTag = null) {
            const feedContainer = document.getElementById('postFeed');
            const postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
            const usersDB = JSON.parse(localStorage.getItem('usersDB')) || [];
            
            let allHtml = '';
            
            // Logika menampilkan filter aktif jika hashtag diklik
            let postsToRender = postsDB;
            if(filterTag) {
                postsToRender = postsDB.filter(p => p.content.includes('#' + filterTag));
                allHtml += `
                    <div style="background: #f1f9fa; padding: 16px 20px; border-radius: 12px; margin-bottom: 24px; border: 1px dashed var(--primary-teal); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; color: var(--primary-teal); font-size: 14px;"><i class="ph-bold ph-hash" style="vertical-align:-2px;"></i> Hasil Pencarian untuk Topik: #${filterTag}</span>
                        <button onclick="renderPosts()" style="background: var(--primary-teal); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'"><i class="ph-bold ph-x"></i> Hapus Filter</button>
                    </div>
                `;
            }
            
            postsToRender.forEach(post => {
                const authorUser = usersDB.find(u => u.username === post.authorName);
                const avatar = authorUser && authorUser.avatar ? authorUser.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(post.authorName)}&background=38495a&color=fff`;
                
                // Cek Likes
                const isLiked = post.likedBy && post.likedBy.includes(activeUserObj.username);
                const heartClass = isLiked ? 'ph-fill ph-heart' : 'ph ph-heart';
                const heartStyle = isLiked ? 'color: var(--accent-pink);' : '';
                const likeCount = post.likedBy ? post.likedBy.length : 0;
                
                // Cek Comments
                const commentCount = post.comments ? post.comments.length : 0;
                let commentsHtml = '<div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 12px;">';
                
                if(post.comments && post.comments.length > 0) {
                    post.comments.forEach((c, cIndex) => {
                        const commenterUser = usersDB.find(u => u.username === c.author);
                        const cAvatar = commenterUser && commenterUser.avatar ? commenterUser.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(c.author)}&background=1aa39a&color=fff`;
                        commentsHtml += `
                            <div style="background: #f8fafb; padding: 12px; border-radius: 8px; display: flex; gap: 12px; align-items:flex-start;">
                                <img src="${cAvatar}" style="width: 24px; height: 24px; border-radius: 50%;">
                                <div style="flex: 1;">
                                    <div style="font-weight: 700; font-size: 13px; color: var(--text-dark); margin-bottom: 2px;">${c.author}</div>
                                    <div style="font-size: 13px; color: var(--text-dark); line-height: 1.4;" id="comment-text-${post.id}-${cIndex}">${c.text}</div>
                                </div>
                                <!-- Titik 3 Komentar -->
                                <div class="comment-menu" style="position: relative;">
                                    <button onclick="toggleMenu('menu-${post.id}-${cIndex}')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding: 4px; transition: color 0.2s;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-muted)'">
                                        <i class="ph-bold ph-dots-three" style="font-size: 20px;"></i>
                                    </button>
                                    
                                    <div id="menu-${post.id}-${cIndex}" style="display:none; position: absolute; right: 0; top: 100%; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; min-width: 140px;">
                                        ${c.author === activeUserObj.username ? `<button onclick="deleteComment(${post.id}, ${cIndex})" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:#ea4335; border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-trash"></i> Hapus</button>` : ''}
                                        <button onclick="copyComment('${post.id}-${cIndex}')" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-copy"></i> Salin</button>
                                        <button onclick="shareComment()" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-share-network"></i> Bagikan</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                
                // Form input komentar berdesain elegan di setiap postingan
                const myAvatar = activeUserObj.avatar ? activeUserObj.avatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(activeUserObj.username)}&background=38495a&color=fff`;
                commentsHtml += `
                    <div style="display: flex; gap: 10px; align-items: center; margin-top: 4px;">
                        <img src="${myAvatar}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                        <input type="text" id="commentInput_${post.id}" placeholder="Tulis balasanmu..." style="flex: 1; padding: 10px 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 30px; font-size: 13px; font-family: inherit; background: #f8fafb; outline: none; transition: all 0.2s;" onfocus="this.style.borderColor='var(--primary-teal)'; this.style.backgroundColor='var(--white)'" onblur="this.style.borderColor='rgba(0,0,0,0.1)'; this.style.backgroundColor='#f8fafb'" onkeypress="handleCommentEnter(event, ${post.id})">
                        <button onclick="submitInlineComment(${post.id})" style="background: var(--primary-teal); color: var(--white); border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" title="Kirim Balasan"><i class="ph-bold ph-paper-plane-right"></i></button>
                    </div>
                </div>`;

                // Rakit element jika ada foto/link
                let mediaHtml = '';
                if(post.image) {
                    mediaHtml += `<img src="${post.image}" style="width:100%; max-height:460px; object-fit:cover; border-radius:12px; margin-top:16px;">`;
                }
                if(post.link) {
                    mediaHtml += `
                        <a href="${post.link}" target="_blank" style="display:flex; align-items:center; gap:8px; color:var(--primary-teal); font-weight:700; text-decoration:none; background:#f1f9fa; padding:12px 16px; border-radius:8px; margin-top:12px; border: 1px solid rgba(106,208,201,0.2);">
                            <i class="ph-bold ph-arrow-square-out" style="font-size: 20px;"></i> Buka Tautan Eksternal
                        </a>
                    `;
                }

                allHtml += `
                    <div class="post-card">
                        <div class="post-header-author" style="margin-bottom: 0;">
                            <img src="${avatar}" alt="${post.authorName}" class="author-avatar" style="border-color: #f1f9fa; object-fit: cover;">
                            <div class="author-info">
                                <h3>${post.authorName}</h3>
                                <p style="color: var(--text-muted); font-size: 12px;">Trailblazer</p>
                            </div>
                            
                            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                                <div class="post-meta-time" style="margin-left: 0;">${post.time}</div>
                                <div class="post-menu-wrapper" style="position: relative;">
                                    <button onclick="toggleMenu('post-menu-${post.id}')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding: 4px; transition: color 0.2s; display: flex;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-muted)'">
                                        <i class="ph-bold ph-dots-three" style="font-size: 24px;"></i>
                                    </button>
                                    
                                    <div id="post-menu-${post.id}" style="display:none; position: absolute; right: 0; top: 100%; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; min-width: 140px;">
                                        ${post.authorName === activeUserObj.username ? `
                                            <button onclick="editPost(${post.id})" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-pencil-simple"></i> Edit</button>
                                            <button onclick="deletePost(${post.id})" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:#ea4335; border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-trash"></i> Hapus</button>
                                        ` : ''}
                                        <button onclick="shareComment()" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-share-network"></i> Bagikan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="post-content-text">
                            ${formatHashtags(post.content)}
                            ${mediaHtml}
                        </div>
                        <div class="post-engagement">
                            <button class="engage-btn" onclick="toggleLike(${post.id})" style="${heartStyle}"><i class="${heartClass}"></i> <span class="like-count">${likeCount}</span></button>
                            <button class="engage-btn" onclick="document.getElementById('commentInput_${post.id}').focus()"><i class="ph ph-chat-circle"></i> ${commentCount}</button>
                        </div>
                        ${commentsHtml}
                    </div>
                `;
            });
            
            // Post default selalu di ujung paling bawah, hanya render jika tidak difilter
            if(!filterTag) {
                allHtml += `
                    <div class="post-card border-glow">
                        <div class="post-header-author" style="margin-bottom: 0;">
                            <img src="chibi_jingliu.png" alt="Jingliu" class="author-avatar" style="border-color: var(--accent-pink);">
                            <div class="author-info">
                                <h3>Jingliu Official <i class="ph-fill ph-check-circle" style="color: var(--primary-teal);"></i></h3>
                                <p style="color: var(--text-muted); font-size: 12px;">Admin</p>
                            </div>
                            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                                <div class="post-meta-time" style="margin-left: 0;">2 April 2026</div>
                                <div class="post-menu-wrapper" style="position: relative;">
                                    <button onclick="toggleMenu('post-menu-jingliu')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding: 4px; transition: color 0.2s; display: flex;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-muted)'">
                                        <i class="ph-bold ph-dots-three" style="font-size: 24px;"></i>
                                    </button>
                                    <div id="post-menu-jingliu" style="display:none; position: absolute; right: 0; top: 100%; background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; min-width: 140px;">
                                        <button onclick="shareComment()" style="width:100%; padding:10px 16px; text-align:left; background:none; border:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-dark); display:flex; align-items:center; gap:8px;" onmouseover="this.style.background='#f8fafb'" onmouseout="this.style.background='none'"><i class="ph-bold ph-share-network"></i> Bagikan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="post-content-text">
                            ${formatHashtags("Selamat datang di dinding komunitas! Jangan ragu untuk membagikan perasaanmu atau hasil #gacha terbarumu di sini.")}
                        </div>
                        <div class="post-engagement">
                            <button class="engage-btn" style="color: var(--accent-pink);"><i class="ph-fill ph-heart"></i> 9,999</button>
                        </div>
                    </div>
                `;
            }

            feedContainer.innerHTML = allHtml;
        }

        // Logic memproses Like masuk ke Database agar aktif permanen
        function toggleLike(postId) {
            if(!activeUserObj) return;
            let postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
            const postIndex = postsDB.findIndex(p => p.id === postId);
            if(postIndex > -1) {
                if(!postsDB[postIndex].likedBy) postsDB[postIndex].likedBy = [];
                
                const userIdx = postsDB[postIndex].likedBy.indexOf(activeUserObj.username);
                if(userIdx > -1) {
                    postsDB[postIndex].likedBy.splice(userIdx, 1); // Batal like
                } else {
                    postsDB[postIndex].likedBy.push(activeUserObj.username); // Beri like
                }
                localStorage.setItem('postsDB', JSON.stringify(postsDB));
                renderPosts();
            }
        }

        // Logic memproses Komentar masuk ke Database via Inline Input
        function submitInlineComment(postId) {
            if(!activeUserObj) return;
            const inputEl = document.getElementById('commentInput_' + postId);
            if(!inputEl) return;
            const text = inputEl.value.trim();
            if(!text) return;

            let postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
            const postIndex = postsDB.findIndex(p => p.id === postId);
            if(postIndex > -1) {
                if(!postsDB[postIndex].comments) postsDB[postIndex].comments = [];
                postsDB[postIndex].comments.push({
                    author: activeUserObj.username,
                    text: text.replace(/</g, "&lt;").replace(/>/g, "&gt;") // Anti-XSS
                });
                localStorage.setItem('postsDB', JSON.stringify(postsDB));
                renderPosts();
            }
        }

        // Jalankan komentar bila di-Enter
        function handleCommentEnter(e, postId) {
            if(e.key === 'Enter') {
                e.preventDefault();
                submitInlineComment(postId);
            }
        }
        // logic aksi 3 Titik (Menu Dropdown dan Klik Luar)
        function toggleMenu(menuId) {
            const el = document.getElementById(menuId);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('[id^="menu-"]').forEach(m => m.style.display = 'none');
            document.querySelectorAll('[id^="post-menu-"]').forEach(m => m.style.display = 'none');
            if(!isVisible) el.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if(!e.target.closest('.comment-menu') && !e.target.closest('.post-menu-wrapper')) {
                document.querySelectorAll('[id^="menu-"]').forEach(m => m.style.display = 'none');
                document.querySelectorAll('[id^="post-menu-"]').forEach(m => m.style.display = 'none');
            }
        });

        // Fitur Edit Post Utama dengan Tema Web (Modal Canggih)
        function editPost(postId) {
            let postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
            const postIdx = postsDB.findIndex(p => p.id === postId);
            if(postIdx > -1) {
                // Ambil string mentah lawas
                const oldContent = postsDB[postIdx].content.replace(/&lt;/g, "<").replace(/&gt;/g, ">");
                
                // Buat Modal Tampilan melayang
                const modalWrapper = document.createElement('div');
                modalWrapper.id = 'editPostModal';
                modalWrapper.style = "position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(6px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.2s ease-out;";
                
                modalWrapper.innerHTML = `
                    <div style="background: var(--white); width: 100%; max-width: 500px; border-radius: 16px; box-shadow: 0 32px 64px rgba(0,0,0,0.15); overflow: hidden; transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);" id="editModalBox">
                        <div style="padding: 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; background: #f8fafb;">
                            <h3 style="margin: 0; font-size: 16px; color: var(--text-dark); font-weight: 800;"><i class="ph-bold ph-pencil-simple" style="color: var(--primary-teal); vertical-align:-2px; margin-right: 6px;"></i> Edit Postingan</h3>
                            <button onclick="closeEditModal()" style="background: none; border: none; font-size: 20px; color: var(--text-muted); cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='#ea4335'" onmouseout="this.style.color='var(--text-muted)'"><i class="ph-bold ph-x"></i></button>
                        </div>
                        <div style="padding: 24px;">
                            <textarea id="editPostTextarea" style="width: 100%; height: 140px; padding: 16px; border: 2px solid rgba(26,163,154,0.15); border-radius: 12px; font-family: inherit; font-size: 14px; outline: none; resize: none; background: #fcfcfc; transition: all 0.2s; box-sizing: border-box;" onfocus="this.style.borderColor='var(--primary-teal)'; this.style.backgroundColor='#ffffff'" placeholder="Apa ketikan baru Anda?"></textarea>
                        </div>
                        <div style="padding: 16px 24px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: flex-end; gap: 12px; background: #f8fafb;">
                            <button onclick="closeEditModal()" class="btn btn-outline" style="padding: 10px 20px; font-size: 13px; margin: 0; min-width: 100px;">Batal</button>
                            <button id="saveEditBtn" class="btn btn-primary" style="padding: 10px 20px; font-size: 13px; margin: 0; min-width: 150px; border: none;"><i class="ph-bold ph-check"></i> Simpan</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modalWrapper);
                
                // Mainkan animasi masuk (delay sejenak via requestAnimationFrame)
                requestAnimationFrame(() => {
                    modalWrapper.style.opacity = '1';
                    document.getElementById('editModalBox').style.transform = 'translateY(0)';
                });
                
                const textarea = document.getElementById('editPostTextarea');
                textarea.value = oldContent;
                textarea.focus();

                // Aksi tombol Simpan
                document.getElementById('saveEditBtn').onclick = function() {
                    const newText = textarea.value;
                    if(newText.trim() !== '') {
                        postsDB[postIdx].content = newText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        localStorage.setItem('postsDB', JSON.stringify(postsDB));
                        closeEditModal();
                        renderPosts(); 
                    }
                };
            }
        }

        // Helper untuk menutup modal halus
        function closeEditModal() {
            const modalWrapper = document.getElementById('editPostModal');
            if(modalWrapper) {
                modalWrapper.style.opacity = '0';
                document.getElementById('editModalBox').style.transform = 'translateY(20px)';
                setTimeout(() => {
                    if (document.body.contains(modalWrapper)) document.body.removeChild(modalWrapper);
                }, 200);
            }
        }

        // Fitur Hapus Post Utama
        function deletePost(postId) {
            if(confirm("Apakah Anda yakin ingin menghapus postingan ini secara permanen?")) {
                let postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
                const postIdx = postsDB.findIndex(p => p.id === postId);
                if(postIdx > -1) {
                    postsDB.splice(postIdx, 1);
                    localStorage.setItem('postsDB', JSON.stringify(postsDB));
                    renderPosts();
                }
            }
        }

        // Fitur Hapus Komentar
        function deleteComment(postId, commentIndex) {
            if(confirm("Apakah Anda yakin ingin menghapus komentar ini? Data tidak dapat dikembalikan.")) {
                let postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
                const postIdx = postsDB.findIndex(p => p.id === postId);
                if(postIdx > -1) {
                    postsDB[postIdx].comments.splice(commentIndex, 1);
                    localStorage.setItem('postsDB', JSON.stringify(postsDB));
                    renderPosts();
                }
            }
        }

        // Fitur Salin Teks
        function copyComment(elementId) {
            const textToCopy = document.getElementById('comment-text-' + elementId).innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Komentar disalin ke Papan Klip (Clipboard)!");
            });
            document.querySelectorAll('[id^="menu-"]').forEach(m => m.style.display = 'none');
        }

        // Fitur Sebar Share
        function shareComment() {
            alert("Tautan menuju komentar ini siap disebarkan via WhatsApp atau Media Sosial!");
            document.querySelectorAll('[id^="menu-"]').forEach(m => m.style.display = 'none');
        }
    </script>
</body>
</html>
