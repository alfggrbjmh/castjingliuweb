<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castorice & Jingliu - Profile</title>
    <!-- Phosphor Icons -->
    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            position: relative;
            z-index: 2;
        }
        .profile-header {
            background: linear-gradient(135deg, var(--primary-teal-dark), #1c1c2e);
            height: 200px;
            border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
            position: relative;
        }
        .profile-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 24px 48px rgba(0,0,0,0.08);
            margin-top: -80px;
            padding: 40px;
            position: relative;
            z-index: 3;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .profile-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid var(--white);
            background: #f1f9fa;
            position: absolute;
            top: -70px;
            left: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scale(0.9);
        }
        .profile-content {
            margin-top: 60px;
        }
        .profile-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 4px;
        }
        .profile-subtitle {
            color: var(--primary-teal);
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .info-card {
            background: #f8fafb;
            padding: 24px;
            border-radius: var(--border-radius-md);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .info-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            word-break: break-all;
        }
        .profile-actions {
            margin-top: 40px;
            display: flex;
            gap: 16px;
            padding-top: 32px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        @media (max-width: 768px) {
            .profile-avatar {
                left: 50%;
                transform: translateX(-50%);
            }
            .profile-content {
                text-align: center;
                margin-top: 80px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .profile-actions {
                flex-direction: column;
            }
        }
    </style>
    <!-- 🚀 Favicon Optimization -->
    <link rel="icon" type="image/png" sizes="32x32" href="chibi_jingliu.png">
    <link rel="icon" type="image/png" sizes="16x16" href="chibi_jingliu.png">
    <link rel="apple-touch-icon" sizes="180x180" href="chibi_jingliu.png">
    <meta name="theme-color" content="#1aa39a">

    <!-- 🚀 SEO & AI Overview Readiness -->
    <meta name="description" content="Bergabunglah dengan Jejaring Komunitas Eksklusif Castorice & Jingliu. Dapatkan koleksi artwork, diskusi lore mendalam, dan status terkini dari para Trailblazer terbaik.">
    <meta name="keywords" content="Castorice, Jingliu, Honkai Star Rail, Komunitas Trailblazer, Galeri Artwork Anime, Lore Game, Jejaring Sosial">
    <meta name="author" content="Castorice & Jingliu Administrator">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://castorice-jingliu.com/">

    <!-- 🚀 Open Graph / Facebook / WhatsApp Preview -->
    <meta property="og:type" content="website">
    <meta property="og:description" content="Jelajahi dunia Castorice dan Jingliu bersama ribuan Trailblazer lainnya.">
    <meta property="og:image" content="hero_banner.png">
    <meta property="og:site_name" content="Castorice & Jingliu Hub">

    <!-- 🚀 PageSpeed / Resource Hints -->
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://ui-avatars.com">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="header-left">
                <button class="icon-btn dark-bg" onclick="window.location.href='profile.html'" title="My Profile"><i class="ph ph-user"></i></button>
                <button class="icon-btn teal-bg" onclick="window.location.href='posting.html'" title="Create Post"><i class="ph ph-plus"></i></button>
            </div>
            <nav class="header-center">
                <a href="index.html">Home</a>
                <a href="home.html">Journey</a>
                <a href="Message.html">Message</a>
                <a href="lihatriwayat.html">History by ALFGGR</a>
            </nav>
            <div class="header-right">
                <!-- Diisi via script Auth State secara dinamik -->
            </div>
        </header>

        <main class="profile-container">
            <div class="profile-header"></div>
            <div class="profile-card">
                <div class="profile-avatar" style="cursor: pointer; position: relative;" onclick="document.getElementById('ppUploader').click()" id="ppContainer" title="Klik untuk ganti foto">
                    <img src="" alt="Avatar User" id="userAvatarImg">
                    <div style="position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 11px; text-align: center; padding: 6px 0; font-weight: bold; opacity: 0; transition: opacity 0.2s;" id="ppOverlay">
                        GANTI FOTO
                    </div>
                    <input type="file" id="ppUploader" accept="image/*" style="display: none;">
                </div>
                <div class="profile-content">
                    <h1 class="profile-title" id="displayUsername">Member</h1>
                    <div class="profile-subtitle"><i class="ph-fill ph-star"></i> Verified Trailblazer</div>

                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-label">Alamat Email</div>
                            <div class="info-value" id="displayEmail">loading...</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Tanggal Bergabung</div>
                            <div class="info-value" id="displayDate">loading...</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Status Langganan</div>
                            <div class="info-value" style="color: #ea4335;"><i class="ph-fill ph-heart"></i> Premium Fan</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Riwayat Posting</div>
                            <div class="info-value" id="displayPostCount" style="color: var(--primary-teal);">0 Postingan</div>
                        </div>
                    </div>

                    <div class="profile-actions">
                        <a href="posting.html" class="btn btn-primary" style="text-decoration:none; text-align:center; flex:1;">Lihat Posting Saya</a>
                        <button onclick="logout()" class="btn btn-outline" style="flex:1; border-color:#ea4335; color:#ea4335; background: #fff0ef;">Keluar (Log out)</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- PROFILE DATA SCRIPT -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Cek Auth Session
            const activeUserStr = localStorage.getItem('activeUser');
            if(!activeUserStr) {
                alert("Akses Ditolak: Anda belum login. Silakan login terlebih dahulu.");
                window.location.replace("login.html");
                return;
            }

            // Parse session and DB
            const activeUser = JSON.parse(activeUserStr);
            const usersDB = JSON.parse(localStorage.getItem('usersDB')) || [];
            
            // Cari data komplit user ini dari Database lokal
            const fullUserData = usersDB.find(u => u.email === activeUser.email);

            if(fullUserData) {
                // Sensor alamat email untuk privasi
                let emailStr = fullUserData.email;
                let maskedEmail = emailStr;
                if(emailStr.includes("@")) {
                    const parts = emailStr.split("@");
                    const name = parts[0];
                    const domain = parts[1];
                    if(name.length > 2) {
                        maskedEmail = name.substring(0, 2) + "********@" + domain;
                    } else {
                        maskedEmail = name.charAt(0) + "****@" + domain;
                    }
                }

                document.getElementById('displayUsername').innerText = fullUserData.username;
                document.getElementById('displayEmail').innerText = maskedEmail;
                document.getElementById('displayDate').innerText = fullUserData.createdAt || "Baru saja";
                
                // Set Avatar Image
                const avatarImg = document.getElementById('userAvatarImg');
                if(fullUserData.avatar) {
                    avatarImg.src = fullUserData.avatar;
                } else {
                    avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(fullUserData.username)}&background=1aa39a&color=fff&size=200`;
                }
            } else {
                document.getElementById('displayUsername').innerText = activeUser.username;
            }
            
            // Hitung total postingan user bersangkutan
            const postsDB = JSON.parse(localStorage.getItem('postsDB')) || [];
            const userPostsCount = postsDB.filter(p => p.authorName === activeUser.username).length;
            document.getElementById('displayPostCount').innerText = userPostsCount + " Postingan";

            // Atur efek Hover Ganti Foto
            const ppContainer = document.getElementById('ppContainer');
            const ppOverlay = document.getElementById('ppOverlay');
            ppContainer.addEventListener('mouseover', () => ppOverlay.style.opacity = '1');
            ppContainer.addEventListener('mouseout', () => ppOverlay.style.opacity = '0');

            // Tangani unggahan foto baru
            document.getElementById('ppUploader').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Img = event.target.result;
                    document.getElementById('userAvatarImg').src = base64Img;
                    
                    // Simpan ke permanen Database (usersDB)
                    const userIndex = usersDB.findIndex(u => u.email === activeUser.email);
                    if(userIndex > -1) {
                        usersDB[userIndex].avatar = base64Img;
                        localStorage.setItem('usersDB', JSON.stringify(usersDB));
                    }
                    
                    // Update sesi aktif juga agar halaman lain bisa menggunakan foto ini
                    activeUser.avatar = base64Img;
                    localStorage.setItem('activeUser', JSON.stringify(activeUser));
                    
                    alert("Foto profil Anda telah berhasil diperbarui!");
                };
                reader.readAsDataURL(file);
            });
            
            // Render Navbar status tanpa tombol logout karena ada di bawah
            const headerRight = document.querySelector('.header-right');
            if(headerRight) {
                headerRight.innerHTML = `
                    <div style="display:flex; align-items:center; gap:16px;">
                        <a href="profile.html" style="font-weight:800; font-size:15px; color:var(--primary-teal); text-decoration:none;">
                            <i class="ph-fill ph-user-circle" style="font-size:24px; vertical-align:-6px; margin-right:4px;"></i> 
                            ${activeUser.username}
                        </a>
                    </div>
                `;
            }
        });

        // Logout logic
        function logout() {
            localStorage.removeItem('activeUser');
            window.location.replace("login.html");
        }
    </script>
</body>
</html>
