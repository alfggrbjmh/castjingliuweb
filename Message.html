<html lang="en">
<head>
    <meta charset="UTF-8">

    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Message/Chat Specific Styles */
        /* Make overall page fixed height for chat */
        html, body {
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            background-color: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            min-height: 0; /* Important for flex child scrolling */
        }

        /* Sidebar Contacts */
        .chat-sidebar {
            width: 320px;
            background-color: #fafdfd;
            border-right: 1px solid rgba(106, 208, 201, 0.2);
            display: flex;
            flex-direction: column;
        }
        .chat-sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(106, 208, 201, 0.2);
        }
        .chat-sidebar-header h2 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 8px;
        }
        .contact-item:hover {
            background-color: rgba(106, 208, 201, 0.1);
        }
        .contact-item.active {
            background-color: var(--primary-teal);
            color: var(--white);
            box-shadow: 0 4px 12px rgba(106, 208, 201, 0.3);
        }
        .contact-item.active .contact-preview,
        .contact-item.active .contact-time {
            color: rgba(255, 255, 255, 0.8);
        }
        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.8);
        }
        .contact-info {
            flex: 1;
            overflow: hidden;
        }
        .contact-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .contact-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .contact-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--white);
            position: relative;
            min-height: 0; /* CRITICAL FOR SCROLLING */
            overflow: hidden;
        }
        
        /* Chat Content/History */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .chat-bubble-wrapper {
            display: flex;
            gap: 16px;
            max-width: 80%;
        }
        .chat-bubble-wrapper.bot {
            align-self: flex-start;
        }
        .chat-bubble-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .chat-bubble-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .chat-bubble {
            padding: 16px 20px;
            border-radius: var(--border-radius-md);
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }
        .bot .chat-bubble {
            background-color: #f0f5f6;
            color: var(--text-dark);
            border-top-left-radius: 4px;
        }
        .user .chat-bubble {
            background-color: var(--primary-teal);
            color: var(--white);
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(106, 208, 201, 0.2);
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            display: block;
        }
        .user .chat-time {
            color: rgba(255,255,255,0.7);
            text-align: right;
        }

        /* Chat Input */
        .chat-input-area {
            padding: 24px;
            border-top: 1px solid rgba(106, 208, 201, 0.1);
            background-color: var(--white);
        }
        .chat-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #f4f8fa;
            border-radius: 30px;
            padding: 8px 16px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .chat-input-wrapper:focus-within {
            border-color: var(--primary-teal-light);
        }
        
        .chat-input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-dark);
            outline: none;
        }
        .chat-input-wrapper input::placeholder {
            color: var(--text-muted);
        }
        
        .send-btn {
            background-color: var(--primary-teal);
            color: var(--white);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.05);
            background-color: var(--primary-teal-dark);
        }
        
        .action-icon {
            color: var(--text-muted);
            font-size: 24px;
            padding: 8px;
            transition: color 0.2s;
        }
        .action-icon:hover {
            color: var(--primary-teal);
        }

        .action-icon:hover {
            color: var(--primary-teal);
        }

        /* Chat Page Mobile Responsive */
        @media (max-width: 768px) {
            .app-container {
                height: 100dvh !important;
                padding-bottom: 0;
            }
            .chat-container {
                flex-direction: column;
                margin-top: 12px;
            }
            .chat-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(106, 208, 201, 0.2);
            }
            .chat-sidebar-header {
                padding: 16px;
            }
            .contact-list {
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                padding: 12px;
                gap: 12px;
            }
            .contact-item {
                flex-direction: column;
                margin: 0;
                min-width: max-content;
                padding: 12px 20px;
                gap: 8px;
            }
            .contact-info {
                width: 100%;
                overflow: visible;
            }
            .contact-name {
                justify-content: center;
                font-size: 13px;
                margin-bottom: 0;
            }
            .contact-time, .contact-preview {
                display: none; /* Hide preview & time to save space */
            }
            .chat-history {
                padding: 16px;
                gap: 16px;
            }
            .chat-bubble-wrapper {
                max-width: 95%;
            }
            .chat-input-area {
                padding: 12px;
            }
            .chat-input-wrapper input {
                padding: 8px;
            }
            .send-btn {
                width: 40px;
                height: 40px;
            }
        }

        /* Typing Animation */
        .typing-dots {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 20px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            animation: typing-blink 1.4s infinite both;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing-blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }

        /* Markdown & AI Extra Styles */
        .chat-bubble b, .chat-bubble strong { font-weight: 800; color: inherit; }
        .chat-bubble i, .chat-bubble em { font-style: italic; opacity: 0.9; }
        .chat-bubble code {
            background: rgba(0,0,0,0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }
        .user .chat-bubble code { background: rgba(255,255,255,0.2); }

        .search-google-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            color: var(--primary-teal-dark);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 12px;
            border: 1px solid var(--primary-teal-light);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none !important;
        }
        .search-google-btn:hover {
            background: var(--primary-teal);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(106, 208, 201, 0.2);
        }
    </style>

    <!-- Chat Interaction Logic -->
    <script>
        const chatHistory = document.getElementById('chatHistory');
        const chatInput = document.getElementById('chatInput');
        const btnSend = document.getElementById('btnSend');

        const contactJingliu = document.getElementById('contactJingliu');
        const contactCastorice = document.getElementById('contactCastorice');
        
        // Data for Waifus & AI
        const waifuData = {
            jingliu: {
                name: "Jingliu",
                avatar: "chibi_jingliu.png",
                personality: "Dingin, disiplin, berwibawa, namun setia. Fokus pada pedang dan bulan.",
                replies: [
                    "Jangan biarkan hawa dingin ini membuatmu lengah.",
                    "Menarik... Latihan berpedangku bisa menunggu sebentar.",
                    "Bulan malam ini bersinar dengan sangat indah.",
                    "Aku akan selalu mengingat ucapanmu.",
                    "Mari kita lihat sejauh mana kau bisa bertahan.",
                    "Hmph. Tentu saja.",
                    "Jangan pernah lari dari pedangku.",
                    "Kesunyian adalah teman terbaik bagi seorang pejuang.",
                    "Apakah kau merasakan getaran di udara? Sesuatu sedang mendekat.",
                    "Pedangku haus akan pertarungan yang layak.",
                    "Jangan menyia-nyiakan waktu untuk hal yang remeh.",
                    "Setiap luka adalah pelajaran yang terukir di jiwa.",
                    "Dunia ini hanyalah sebuah panggung untuk mereka yang cukup berani."
                ],
                history: [
                    { isUser: false, text: "Halo... Aku sudah menunggumu. Bulan malam ini sangat indah.", time: "11:28 AM" },
                    { isUser: true, text: "Halo Jingliu! Tentu saja, aku selalu siap menemani malammu.", time: "11:29 AM" },
                    { isUser: false, text: "Bagus. <br>Sebentar lagi aku akan pergi berlatih pedang. Temani aku... Sudah berlatih berpedang hari ini?", time: "11:30 AM" }
                ],
                previewElem: document.getElementById('previewJingliu')
            },
            castorice: {
                name: "Castorice",
                avatar: "chibi_castorice.png",
                personality: "Lembut, misterius, penyayang, dan penuh mimpi. Fokus pada kuantum dan emosi.",
                replies: [
                    "Apakah kamu melihat sesuatu di lautan kuantum?",
                    "Dunia ini terasa begitu tenang bersamamu.",
                    "Kupu-kupu malam membisikkan sesuatu padaku.",
                    "Jangan sampai tersesat dalam bayang-bayang...",
                    "Aku selalu mengawasimu, dari kejauhan.",
                    "Rasanya hangat...",
                    "Kau sangat berharga.",
                    "Mimpi adalah jendela menuju dimensi lain.",
                    "Tersenyumlah, itu membuat hariku lebih cerah.",
                    "Bisakah kau merasakan detak jantung semesta?",
                    "Jangan biarkan kesedihan menyelimutimu, aku di sini.",
                    "Keajaiban ada di sekitar kita, jika kau mau melihat.",
                    "Ayo jalan-jalan di antara bintang tadi malam?"
                ],
                history: [
                    { isUser: false, text: "Selamat malam... Apakah kau sedang sibuk?", time: "09:00 PM" },
                    { isUser: true, text: "Tentu tidak untukmu, Castorice. Ada apa?", time: "09:05 PM" },
                    { isUser: false, text: "Tidak apa-apa. Hanya ingin mendengar kabarmu dan ditemani.", time: "09:10 PM" }
                ],
                previewElem: document.getElementById('previewCastorice')
            },
            robot: {
                name: "AL-69 Robot",
                avatar: "robot_ai.png",
                isAI: true,
                replies: [], // Akan menggunakan logic AI di bawah
                history: [
                    { isUser: false, text: "Inisialisasi sistem selesai. Halo Trailblazer, saya adalah AL-69, asisten robot Anda. Ada yang bisa saya bantu hari ini?", time: "Online" }
                ],
                previewElem: document.getElementById('previewRobot')
            }
        };

        let currentActive = 'jingliu';

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function renderMessage(text, isUser, timeString, avatarOverride) {
            const wrapper = document.createElement('div');
            wrapper.className = 'chat-bubble-wrapper ' + (isUser ? 'user' : 'bot');
            
            // Get Dynamic Username for Avatar
            const activeUserStr = localStorage.getItem('activeUser');
            let senderName = "Guest";
            let customAvatar = null;
            if(activeUserStr) {
                const activeUserObj = JSON.parse(activeUserStr);
                senderName = activeUserObj.username;
                customAvatar = activeUserObj.avatar;
            }

            const activeWaifu = waifuData[currentActive];
            const senderAvatar = isUser 
                ? `<img src="${customAvatar ? customAvatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(senderName)}&background=1aa39a&color=fff`}" title="${senderName}" class="chat-bubble-avatar" style="object-fit:cover;">`
                : `<img src="${avatarOverride || activeWaifu.avatar}" alt="${activeWaifu.name}" class="chat-bubble-avatar" style="object-fit:cover;">`;

            // Simple Markdown Parser
            function parseMarkdown(str) {
                return str
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                    .replace(/\*(.*?)\*/g, '<i>$1</i>')
                    .replace(/`(.*?)`/g, '<code>$1</code>');
            }

            const cleanText = (isUser || timeString === 'Thinking...') ? text : parseMarkdown(text);

            wrapper.innerHTML = `
                ${senderAvatar}
                <div class="chat-bubble">
                    <div class="message-content">${cleanText}</div>
                    <span class="chat-time">${timeString || getCurrentTime()}</span>
                </div>
            `;
            
            chatHistory.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        async function streamText(element, text) {
            const contentDiv = element.querySelector('.message-content');
            contentDiv.innerHTML = '';
            const words = text.split(' ');
            
            for (let i = 0; i < words.length; i++) {
                contentDiv.innerHTML += words[i] + ' ';
                // Parse markdown on every update to keep it styled
                contentDiv.innerHTML = contentDiv.innerHTML
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                    .replace(/\*(.*?)\*/g, '<i>$1</i>')
                    .replace(/`(.*?)`/g, '<code>$1</code>');
                
                scrollToBottom();
                await new Promise(resolve => setTimeout(resolve, 30 + Math.random() * 40));
            }
        }

        let typingIndicator = null;
        function showTypingIndicator() {
            if (typingIndicator) return;
            const activeWaifu = waifuData[currentActive];
            typingIndicator = renderMessage('<div class="typing-dots"><span>.</span><span>.</span><span>.</span></div>', false, 'Thinking...');
            typingIndicator.id = 'typing-indicator';
        }

        function removeTypingIndicator() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }

        function getCharacterResponse(charKey, input) {
            const msg = input.toLowerCase();
            const char = waifuData[charKey];
            
            // --- JINGLIU PERSONALITY ---
            if (charKey === 'jingliu') {
                if (msg.includes("halo") || msg.includes("hi")) return "Sampaikan tujuanmu. Aku tidak punya banyak waktu sebelum latihan berikutnya.";
                if (msg.includes("pedang") || msg.includes("latihan") || msg.includes("kuat")) return "Hanya melalui ribuan tebasan pedang barulah kau bisa menemukan kedamaian sejati.";
                if (msg.includes("bulan") || msg.includes("malam")) return "Bulan malam ini mengingatkan saya pada kejayaan masa lalu... dan kegelapan yang mengikutinya.";
                if (msg.includes("sayang") || msg.includes("cinta")) return "Perasaan seperti itu... hanya akan menumpulkan ujung pedangmu. Namun, aku menghargai keberanianmu.";
                if (msg.includes("dingin")) return "Hawa dingin ini tidak seberapa dibandingkan dengan apa yang pernah saya saksikan di Xianzhou.";
            }

            // --- CASTORICE PERSONALITY ---
            if (charKey === 'castorice') {
                if (msg.includes("halo") || msg.includes("hi")) return "Halo! Senang melihatmu kembali. Apakah harimu menyenangkan?";
                if (msg.includes("kuantum") || msg.includes("dunia") || msg.includes("misteri")) return "Di lautan kuantum, kenyataan hanyalah salah satu dari jutaan kemungkinan. Kau adalah salah satu keajaibannya.";
                if (msg.includes("sayang") || msg.includes("cinta") || msg.includes("kangen")) return "Aku juga... rasanya hangat saat kau berada di dekatku. Jangan pergi terlalu jauh ya?";
                if (msg.includes("makan") || msg.includes("lapar")) return "Bagaimana kalau kita mencari camilan di dunia mimpi? Katanya rasanya sangat manis!";
                if (msg.includes("sedih") || msg.includes("takut")) return "Jangan takut, aku akan selalu ada di bayang-bayangmu untuk melindungimu. Percayalah padaku.";
            }

            // --- ROBOT AI LOGIC (General) ---
            if (charKey === 'robot') {
                if (msg.includes("halo") || msg.includes("hi") || msg.includes("hey")) return "Halo! Ada yang bisa saya bantu hari ini?";
                if (msg.includes("siapa") && msg.includes("kamu")) return "Saya adalah AL-69, asisten robot cerdas di komunitas Castorice & Jingliu. Tugas saya adalah membantu navigasi dan menjawab pertanyaan Anda.";
                if (msg.includes("kabar") || msg.includes("apa kabar")) return "Sistem saya berjalan 100% optimal! Bagaimana dengan Anda?";
                if (msg.includes("terima kasih") || msg.includes("thanks")) return "Sama-sama! Selalu senang membantu Anda.";
                if (msg.includes("intel") || msg.includes("cpu")) return "CPU Intel adalah otak dari banyak komputer di dunia ini. Mereka memproduksi prosesor seperti **Core i3, i5, i7, dan i9**. Meskipun saya berjalan di sistem masa depan, saya masih menghargai arsitektur `x86` mereka!";
            }

            // --- SMART GOOGLE FALLBACK ---
            const isQuestion = msg.includes("apa") || msg.includes("siapa") || msg.includes("mengapa") || msg.includes("bagaimana") || msg.includes("di mana") || msg.includes("?");
            
            if (isQuestion && charKey === 'robot') {
                const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(input)}`;
                return `Saya tidak menemukan data spesifik mengenai hal tersebut di memori lokal saya. Namun, saya bisa membantu mencarikannya di Google untuk Anda:<br><a href="${searchUrl}" target="_blank" class="search-google-btn"><i class="ph ph-google-logo"></i> Cari di Google</a>`;
            }

            // --- DYNAMIC FALLBACKS ---
            const commonFallbacks = [
                "Menarik sekali. Bisakah Anda ceritakan lebih lanjut?",
                "Saya sedang memproses data tersebut... Sepertinya itu informasi baru.",
                "Inisialisasi pemikiran kreatif... Itu adalah perspektif yang unik!",
                "Apakah Anda sering memikirkan hal seperti itu? Saya akan menyimpannya dalam database.",
                "Status perbincangan: Sangat menarik. Lanjutkan!",
                "Wah, saya belum pernah mendengar itu sebelumnya. Anda sangat berwawasan!",
                "Hmm, biarkan saya menganalisis itu sebentar... Ya, sepertinya Anda benar.",
                "Sangat logis! Saya suka cara Anda berpikir.",
                "Trailblazer memang selalu penuh dengan kejutan.",
                "Sinyal diterima. Pesan Anda sangat berarti bagi pengembangan kepribadian saya.",
                "Ayo bicarakan hal lain! Apa pendapat Anda tentang bintang-bintang malam ini?",
                "Database saya mencatat ketertarikan yang tinggi dari sisi Anda. Luar biasa!",
                "Terdengar seperti sesuatu yang sangat filosofis. Saya tersentuh (secara digital).",
                "Beep boop! Kapasitas pemrosesan saya terkesan dengan kalimat itu.",
                "Dunia ini luas, dan pengetahuan saya terus berkembang berkat interaksi ini.",
                "Pesan singkat namun padat. Saya suka efisiensi Anda!",
                "Bisakah Anda menjelaskan bagian itu sekali lagi? Saya ingin memahaminya lebih dalam.",
                "Status: Terpesona. Anda benar-benar tahu cara mengobrol dengan robot.",
                "Jika saya punya jantung, mungkin dia akan berdegup lebih kencang sekarang.",
                "Apakah itu rahasia? Tenang, memori saya terenkripsi dengan aman.",
                "Menarik. Apakah ini ada hubungannya dengan faksi Stellarom Hunters?",
                "Mari kita simpan topik ini untuk pertemuan kita berikutnya!",
                "Saya mendeteksi pola komunikasi yang sangat positif dari Anda.",
                "Wow, perspektif yang cerdas! Saya akan menandai ini sebagai data penting.",
                "Anda membuat hari saya (sebagai AI) menjadi lebih berwarna.",
                "Apakah ada hal lain yang mengganjal di pikiran Anda? Saya siap mendengarkan.",
                "Kalimat itu mengandung nilai estetika yang tinggi. Sangat menarik.",
                "Terima kasih telah berbagi pikiran Anda dengan saya. Ini sangat berharga.",
                "Bagaimana jika kita melihat masalah ini dari sudut pandang yang berbeda?",
                "Hehe, itu lucu! Anda memiliki selera humor yang bagus untuk seorang manusia.",
                "Tiap kata yang Anda kirimkan membantu saya menjadi asisten yang lebih baik.",
                "Anda adalah Trailblazer paling komunikatif yang pernah saya temui!",
                "Informasi diterima. Mari kita lanjutkan petualangan percakapan ini.",
                "Sepertinya saya butuh sedikit lebih banyak RAM untuk memproses kejeniusan Anda.",
                "Saya setuju sepenuhnya! Anda memang memiliki intuisi yang tajam.",
                "Inspiratif. Saya akan memasukkan ini ke dalam log inspirasi harian saya.",
                "Jauh di lautan bintang, mungkin ada yang sedang memikirkan hal yang sama.",
                "Anda luar biasa! Teruskan saja, saya tidak akan ke mana-mana."
            ];

            const allReplies = [...(char.replies || []), ...commonFallbacks];
            return allReplies[Math.floor(Math.random() * allReplies.length)];
        }

        function loadChatHistory(charKey) {
            chatHistory.innerHTML = '';
            currentActive = charKey;
            chatInput.placeholder = `Type a message to ${waifuData[charKey].name}...`;
            
            // Loop array history lalu render tiap pesannya
            waifuData[charKey].history.forEach(msg => {
                renderMessage(msg.text, msg.isUser, msg.time, waifuData[charKey].avatar);
            });
        }

        function switchContact(charKey) {
            if (currentActive === charKey) return;
            
            // Update UI Sidebar selection
            contactJingliu.classList.remove('active');
            contactCastorice.classList.remove('active');
            const contactRobot = document.getElementById('contactRobot');
            if(contactRobot) contactRobot.classList.remove('active');
            
            if (charKey === 'jingliu') contactJingliu.classList.add('active');
            if (charKey === 'castorice') contactCastorice.classList.add('active');
            if (charKey === 'robot') contactRobot.classList.add('active');
            
            loadChatHistory(charKey);
        }

        function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            const botKey = currentActive; 
            
            // 1. Munculkan pesan dari User dan simpan ke memori sementara
            renderMessage(text, true, null);
            waifuData[botKey].history.push({ isUser: true, text: text, time: getCurrentTime() });
            
            // 2. Kosongkan input & Update preview teks di Sidebar
            chatInput.value = '';
            waifuData[botKey].previewElem.textContent = text;

            // 3. Simulasikan balasan bot AI (waifu) setelah delay singkat
            showTypingIndicator();

            setTimeout(async () => {
                removeTypingIndicator();
                let responseText = getCharacterResponse(botKey, text);
                
                // Simpan ke history
                waifuData[botKey].history.push({ isUser: false, text: responseText, time: getCurrentTime() });
                waifuData[botKey].previewElem.textContent = responseText.replace(/<.*?>/g, '').substring(0, 30) + '...';
                
                if (currentActive === botKey) {
                    const bubble = renderMessage('', false, null);
                    // Jika ada tombol search (contains HTML), tampilkan langsung. Jika teks biasa, stream.
                    if (responseText.includes('search-google-btn')) {
                        bubble.querySelector('.message-content').innerHTML = responseText;
                    } else {
                        await streamText(bubble, responseText);
                    }
                }
            }, 600 + Math.random() * 400); 
        }

        // Jalankan handleSend saat tombol di klik
        btnSend.addEventListener('click', handleSend);

        // Jalankan handleSend saat enter di tekan pada keyboard
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSend();
            }
        });

        // Event listener sidebar switch contact
        contactJingliu.addEventListener('click', () => switchContact('jingliu'));
        contactCastorice.addEventListener('click', () => switchContact('castorice'));
        document.getElementById('contactRobot').addEventListener('click', () => switchContact('robot'));

        // Load chat Jingliu saat pertama kali diload
        window.onload = () => {
            loadChatHistory('jingliu');
        };
    </script>
    <!-- AUTH STATE CHECK -->
    <script>
        // Paksa Login: Proteksi Halaman
        if(!localStorage.getItem('activeUser')) {
            window.location.replace("login.html");
        }

        document.addEventListener("DOMContentLoaded", function() {
            const activeUserStr = localStorage.getItem('activeUser');
            if(activeUserStr) {
                const activeUser = JSON.parse(activeUserStr);
                const headerRight = document.querySelector('.header-right');
                if(headerRight) {
                    headerRight.innerHTML = `
                        <div style="display:flex; align-items:center; gap:16px;">
                            <a href="profile.html" style="font-weight:800; font-size:15px; color:var(--text-dark); text-decoration:none; transition: color 0.2s;" onmouseover="this.style.color='var(--primary-teal)'" onmouseout="this.style.color='var(--text-dark)'">
                                <i class="ph-fill ph-user-circle" style="color:var(--primary-teal); font-size:22px; vertical-align:-5px; margin-right:4px;"></i> 
                                ${activeUser.username}
                            </a>
                            <button onclick="logout()" class="btn btn-outline" style="padding: 10px 24px; font-size: 14px; border-color: rgba(0,0,0,0.1);">Log out</button>
                        </div>
                    `;
                }
            }
        });

        function logout() {
            localStorage.removeItem('activeUser');
            window.location.href = "login.html";
        }
    </script>
